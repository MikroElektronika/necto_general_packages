name: Index Release Assets

on:
  # workflow_run:
  #   workflows:
  #     - Package Release Assets
  #   types:
  #     - completed
  #   branches:
  #     - main

  workflow_dispatch:
    inputs:
      index_development:
        type: boolean
        description: Index to Development
        default: true

      index_experimental:
        type: boolean
        description: Index to Experimental
        default: false

      index_live:
        type: boolean
        description: Index to Live
        default: false

      necto_assistant_repo_ref:
        type: string
        description: Branch/ref in private NECTO Assistant repo where import workflow exists
        default: main
        required: true

      necto_assistant_pr_target_branch:
        type: string
        description: Target branch in private NECTO Assistant repo for generated language PR
        default: main
        required: true

permissions:
  contents: read
  actions: read

jobs:
  index:
    runs-on: ubuntu-latest

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Authorize Mikroe Actions App
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.MIKROE_ACTIONS }}
          private-key: ${{ secrets.MIKROE_ACTIONS_KEY_AUTHORIZE }}

      - name: Authorize Mikroe Actions App for NECTO Assistant repo
        uses: actions/create-github-app-token@v2
        id: necto-assistant-app-token
        with:
          app-id: ${{ vars.MIKROE_ACTIONS }}
          private-key: ${{ secrets.MIKROE_ACTIONS_KEY_AUTHORIZE }}
          owner: MikroElektronika
          repositories: |
            ${{ secrets.NECTO_ASSISTANT_REPO_NAME }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: necto-asssitant-translation-integration
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Cache Python packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements/shared.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements/shared.txt

      - name: Resolve selected indexes
        id: resolve-index
        env:
          ES_INDEX_LIVE: ${{ secrets.ES_INDEX_LIVE }}
          ES_INDEX_TEST: ${{ secrets.ES_INDEX_TEST }}
          ES_INDEX_EXPERIMENTAL: ${{ secrets.ES_INDEX_EXPERIMENTAL }}
        run: |
          set -euo pipefail

          indexes=()
          selected_names=()

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "Automatic run after packaging. Defaulting to Development index."
            indexes+=("$ES_INDEX_TEST")
            selected_names+=("Development")
          else
            if [[ "${{ github.event.inputs.index_development }}" == "true" ]]; then
              indexes+=("$ES_INDEX_TEST")
              selected_names+=("Development")
            fi

            if [[ "${{ github.event.inputs.index_experimental }}" == "true" ]]; then
              indexes+=("$ES_INDEX_EXPERIMENTAL")
              selected_names+=("Experimental")
            fi

            if [[ "${{ github.event.inputs.index_live }}" == "true" ]]; then
              indexes+=("$ES_INDEX_LIVE")
              selected_names+=("Live")
            fi
          fi

          if [[ ${#indexes[@]} -eq 0 ]]; then
            echo "No index selected."
            exit 1
          fi

          index_names=$(IFS='|'; echo "${indexes[*]}")
          selected_indexes=$(IFS=', '; echo "${selected_names[*]}")

          echo "index_names=$index_names" >> "$GITHUB_OUTPUT"
          echo "selected_indexes=$selected_indexes" >> "$GITHUB_OUTPUT"

          echo "Selected indexes: $selected_indexes"
          echo "Index names: $index_names"

      - name: Prepare indexing plan
        env:
          ES_HOST: ${{ secrets.ES_HOST }}
          ES_USER: ${{ secrets.ES_USER }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_INDEX_LIVE: ${{ secrets.ES_INDEX_LIVE }}
          ES_INDEX_TEST: ${{ secrets.ES_INDEX_TEST }}
          ES_INDEX_EXPERIMENTAL: ${{ secrets.ES_INDEX_EXPERIMENTAL }}
        run: |
          python -u scripts/index.py \
            "${{ steps.app-token.outputs.token }}" \
            "${{ github.repository }}" \
            "${{ steps.resolve-index.outputs.index_names }}" \
            --dry_run "True"

      - name: Trigger NECTO Assistant language auto-generation
        env:
          NECTO_ASSISTANT_AUTO_TRANSLATE_TOKEN: ${{ secrets.NECTO_ASSISTANT_AUTO_TRANSLATE_TOKEN }}

          NECTO_ASSISTANT_IMPORT_PR_TOKEN: ${{ steps.necto-assistant-app-token.outputs.token }}
          NECTO_ASSISTANT_IMPORT_PR_REPO: MikroElektronika/${{ secrets.NECTO_ASSISTANT_REPO_NAME }}
          NECTO_ASSISTANT_IMPORT_PR_WORKFLOW: import-runtime-language.yaml
          NECTO_ASSISTANT_IMPORT_PR_REF: ${{ github.event.inputs.necto_assistant_repo_ref || 'main' }}
          NECTO_ASSISTANT_IMPORT_PR_TARGET_BRANCH: ${{ github.event.inputs.necto_assistant_pr_target_branch || 'main' }}
        run: |
          if [ ! -s "tmp/necto_assistant_auto_translation_targets.json" ]; then
            echo "No NECTO Assistant auto-translation target file found. Skipping."
            exit 0
          fi

          echo "NECTO Assistant auto-translation targets:"
          cat tmp/necto_assistant_auto_translation_targets.json

          python -u scripts/trigger_necto_assistant_auto_translation.py \
            --targets-file tmp/necto_assistant_auto_translation_targets.json \
            --token "$NECTO_ASSISTANT_AUTO_TRANSLATE_TOKEN" \
            --interval-seconds 60 \
            --max-wait-minutes 240 \
            --dispatch-import-pr

      - name: Run index script
        env:
          ES_HOST: ${{ secrets.ES_HOST }}
          ES_USER: ${{ secrets.ES_USER }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_INDEX_LIVE: ${{ secrets.ES_INDEX_LIVE }}
          ES_INDEX_TEST: ${{ secrets.ES_INDEX_TEST }}
          ES_INDEX_EXPERIMENTAL: ${{ secrets.ES_INDEX_EXPERIMENTAL }}
        run: |
          python -u scripts/index.py \
            "${{ steps.app-token.outputs.token }}" \
            "${{ github.repository }}" \
            "${{ steps.resolve-index.outputs.index_names }}"
